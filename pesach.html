
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>קולקציית פסח | Up סטוק</title>
    <style>
        :root { --primary: #ed1c24; --dark: #1a1a1a; --light: #f8f9fa; --gold: #d4a843; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: var(--light); color: var(--dark); direction: rtl; }

        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-top: 20px; }
        .product-card { background: white; border-radius: 15px; padding: 15px; border: 1px solid #f0f0f0; display: flex; flex-direction: column; transition: 0.2s; }
        .product-card:hover { box-shadow: 0 6px 18px rgba(0,0,0,0.1); transform: translateY(-3px); }
        .product-card img { width: 100%; aspect-ratio: 1/1; object-fit: contain; border-radius: 10px; margin-bottom: 10px; cursor: pointer; }
        .product-card h4 { margin: 8px 0; min-height: 40px; }
        .add-btn { background: var(--dark); color: white; border: none; width: 100%; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: auto; transition: background 0.2s; }
        .add-btn:active { background: #444; }
        .add-btn:disabled { background: #ccc; cursor: not-allowed; }
        .out-of-stock-badge { background: #ed1c24; color: white; font-size: 0.8em; font-weight: bold; padding: 4px 10px; border-radius: 20px; display: inline-block; margin-bottom: 8px; }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        .page-header {
            text-align: center;
            padding: 35px 20px;
            background: linear-gradient(135deg, #fdf6e3, #fff8e7, #fdf6e3);
            border-bottom: 3px solid var(--gold);
        }
        .page-header h1 { margin: 0; color: #8b6914; font-size: 2em; }
        .page-header p { margin: 10px 0 0; color: #a07d2e; font-size: 1.1em; }

        #imgOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 5000; justify-content: center; align-items: center; cursor: pointer; }
        #imgOverlay img { max-width: 90%; max-height: 85%; border: 3px solid white; border-radius: 10px; }

        .empty-state { text-align: center; padding: 60px 20px; color: #999; }
        .empty-state h3 { font-size: 1.4em; color: #666; }

        .back-link { display: inline-block; margin: 20px 0; color: var(--gold); text-decoration: none; font-weight: 600; font-size: 1.05em; }
        .back-link:hover { text-decoration: underline; }
    </style>
    <script src="common.js" defer></script>
</head>
<body>

<div class="page-header">
    <div style="font-size:2em; margin-bottom:8px;">🍷🫓✨</div>
    <h1>קולקציית פסח</h1>
    <p>השולחן ערוך — אתם רק צריכים לשבת</p>
</div>

<div class="container">
    <a href="index.html" class="back-link">→ חזרה לדף הבית</a>

    <div class="products-grid" id="pesach-products">
        <div class="empty-state" id="loading-msg">
            <h3>🫓 טוען מוצרי פסח...</h3>
        </div>
    </div>
</div>

<div id="imgOverlay" onclick="this.style.display='none'">
    <img id="viewImg" src="">
</div>

<script>
function openImg(src) {
    document.getElementById('viewImg').src = src;
    document.getElementById('imgOverlay').style.display = 'flex';
}

async function loadPesachProducts() {
    const container = document.getElementById('pesach-products');
    try {
        const res = await fetch('stock_pesach.csv?t=' + Date.now());
        const text = await res.text();
        const rows = text.split('\n').filter(r => r.trim());

        if (rows.length <= 1) {
            container.innerHTML = '<div class="empty-state"><h3>🫓 מוצרי פסח יעלו בקרוב!</h3><p>אנחנו מכינים את הקולקציה המיוחדת לחג</p></div>';
            return;
        }

        let html = '';
        for (let i = 1; i < rows.length; i++) {
            const cols = rows[i].split(',');
            if (cols.length < 3) continue;
            const name  = cols[0]?.trim();
            const image = cols[1]?.trim();
            const price = parseFloat(cols[2]?.trim());
            const stock = cols[3]?.trim() !== '0';
            if (!name || isNaN(price)) continue;

            const imgPath = image ? 'pesach-collection/' + image : 'images/logo.jpg';
            const safeName = name.replace(/'/g, "\\'");

            html += '<div class="product-card" style="' + (!stock ? 'opacity:0.7;' : '') + '">' +
                '<img src="' + imgPath + '" onerror="this.src=\'images/logo.jpg\'" onclick="openImg(this.src)">' +
                '<h4>' + name + '</h4>' +
                (!stock ? '<div class="out-of-stock-badge">אזל המלאי</div>' : '') +
                '<div style="color:#8b6914;font-weight:bold;font-size:1.2em;margin-bottom:10px;">₪' + price.toFixed(2) + '</div>' +
                '<button class="add-btn" ' + (!stock ? 'disabled style="background:#ccc;cursor:not-allowed;">אזל המלאי' : 'onclick="addToCart(\'' + safeName + '\',' + price + ')">הוסף לסל +') +
                '</button></div>';
        }
        container.innerHTML = html || '<div class="empty-state"><h3>🫓 מוצרי פסח יעלו בקרוב!</h3></div>';
    } catch(e) {
        container.innerHTML = '<div class="empty-state"><h3>🫓 מוצרי פסח יעלו בקרוב!</h3><p>אנחנו מכינים את הקולקציה המיוחדת לחג</p></div>';
    }
}

window.addEventListener('DOMContentLoaded', loadPesachProducts);
</script>
</body>
</html>
