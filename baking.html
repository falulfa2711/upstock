
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אפייה ומטבח | Up סטוק</title>
    <style>
        /* ===== סטייל ייחודי לדף אפייה בלבד ===== */
        .page-header { text-align: center; padding: 30px 20px; background: white; border-bottom: 3px solid var(--primary); margin-bottom: 30px; }
        .page-header h1 { margin: 0; color: var(--primary); font-size: 2em; }
        .page-header p { margin: 10px 0 0; color: #666; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin: 30px 0; }
        .gallery img { width: 100%; height: 200px; object-fit: cover; border-radius: 12px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.08); transition: 0.2s; }
        .gallery img:hover { transform: scale(1.02); }
        .section-title { border-right: 5px solid var(--primary); padding-right: 15px; font-size: 1.4em; margin: 30px 0 20px; }
    </style>
    <script src="common.js" defer></script>
</head>
<body>

    <div class="page-header">
        <h1>🥧 אפייה ומטבח</h1>
        <p>תבניות, אביזרי אפייה, כלי הגשה וכל מה שצריך למטבח</p>
    </div>

    <div class="container">
        <h2 class="section-title">תמונות מהחנות</h2>
        <div class="gallery">
            <img src="images/bake1.jpeg" alt="אפייה" onclick="openImg(this.src)" onerror="this.style.display='none'">
            <img src="images/bake2.jpeg" alt="אפייה" onclick="openImg(this.src)" onerror="this.style.display='none'">
            <img src="images/bake3.jpeg" alt="אפייה" onclick="openImg(this.src)" onerror="this.style.display='none'">
            <img src="images/bake4.jpeg" alt="אפייה" onclick="openImg(this.src)" onerror="this.style.display='none'">
        </div>

        <div id="productSliderSection" class="product-slider-section">
            <h2 class="section-title">🛍️ מוצרים נבחרים</h2>
            <div class="product-slider-wrap">
                <button class="slider-arrow slider-arrow-next" onclick="slideProducts('next')">❮</button>
                <div class="product-slider" id="productSlider" data-category="מוצרי אפיה ובישול"></div>
                <button class="slider-arrow slider-arrow-prev" onclick="slideProducts('prev')">❯</button>
            </div>
        </div>
    </div>

</body>
</html>
